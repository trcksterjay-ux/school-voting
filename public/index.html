<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School Voting System</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<script>
  // Enforce max 5 checkboxes for officers
  document.addEventListener('DOMContentLoaded', function() {
    const officerCheckboxes = document.querySelectorAll('input[name="officers"]');
    officerCheckboxes.forEach(function(box) {
      box.addEventListener('change', function() {
        const checked = document.querySelectorAll('input[name="officers"]:checked');
        if (checked.length > 5) {
          this.checked = false;
          alert('You can select up to 5 officers only.');
        }
      });
    });
  });
</script>


<body>
  <div class="container">
    <header>
      <h1>🏫 School Voting System</h1>
      <p class="subtitle">Cast your vote securely and see results live!</p>
    </header>
    
    <section class="card">
      <h2>Register</h2>
      <form action="/register" method="post" class="form">
        <input type="text" name="school_id" placeholder="School ID" required>
        <input type="text" name="name" placeholder="Your Name" required>
        <button type="submit">Register</button>
      </form>
    </section>
    
<section class="card">
  <h2>Vote Now</h2>
  <form action="/vote" method="post" class="form" id="voteForm">
    <input type="text" name="school_id" placeholder="Your School ID" required>

    <fieldset>
      <legend class="vote-cat">President</legend>
      <label><input type="radio" name="president" value="Alice" required> Alice</label><br>
      <label><input type="radio" name="president" value="Bob"> Bob</label>
    </fieldset>

    <fieldset>
      <legend class="vote-cat">Vice President</legend>
      <label><input type="radio" name="vp" value="Charlie" required> Charlie</label><br>
      <label><input type="radio" name="vp" value="Dana"> Dana</label>
    </fieldset>

    <fieldset>
      <legend class="vote-cat">Officers <span style="font-size: 0.9em; color: #888;">(select up to 5)</span></legend>
      <label><input type="checkbox" name="officers" value="Eve"> Eve</label><br>
      <label><input type="checkbox" name="officers" value="Frank"> Frank</label><br>
      <label><input type="checkbox" name="officers" value="Grace"> Grace</label><br>
      <label><input type="checkbox" name="officers" value="Heidi"> Heidi</label><br>
      <label><input type="checkbox" name="officers" value="Ivan"> Ivan</label><br>
      <label><input type="checkbox" name="officers" value="Judy"> Judy</label><br>
      <label><input type="checkbox" name="officers" value="Kim"> Kim</label><br>
      <label><input type="checkbox" name="officers" value="Leo"> Leo</label><br>
      <label><input type="checkbox" name="officers" value="Mallory"> Mallory</label><br>
      <label><input type="checkbox" name="officers" value="Nina"> Nina</label>
    </fieldset>

    <button type="submit">Vote</button>
  </form>
</section>

    <section class="card results-section">
      <h2>Live Results</h2>
      <div id="results"></div>
    </section>
  </div>
  <footer>
    &copy; 2026 School Voting System &middot; Created by Jkramz
  </footer>
  <script>
    function loadResults() {
      fetch('/results').then(res => res.json()).then(data => {
        let html = "";
        data.forEach((c, idx) => {
          html += `<div class="result-bar">
            <span class="candidate">${c.candidate}</span>
            <div class="bar-outer">
              <div class="bar-inner" style="width:${Math.min(100, c.count * 20)}%;"></div>
            </div>
            <span class="votes">${c.count} vote${c.count != 1 ? 's' : ''}</span>
          </div>`;
        });
        if (!html) html = "<p>No votes yet.</p>";
        document.getElementById('results').innerHTML = html;
      });
    }
    setInterval(loadResults, 1500);
    loadResults();

 setInterval(loadResults, 1500);
  loadResults();

  // Show a pop-up if "vote=success" found in URL
  window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('vote') === 'success') {
      alert("Vote Successful!");
      // Optionally, remove the query part from the URL without reloading:
      if (window.history.replaceState) {
        const url = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, url);
      }
    }
  };

  </script>
</body>
</html>
